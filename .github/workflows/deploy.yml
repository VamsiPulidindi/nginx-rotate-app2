name: Deploy To EC2

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa

          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |

          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF

          cd ~/nginx-rotate-app

          git pull

          sudo cp webpages/*.html /var/www/html/

          sudo ln -sf /var/www/html/index1.html /var/www/html/index.html

          ./start_rotation.sh

          sudo nginx -s reload

          EOF
